<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Barbería Elite</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>

<div class="login-container">

    <div class="login-card">

        <h1>💈 Barbería Elite</h1>
        <p>Crear una nueva cuenta</p>

        <form method="POST">

            <input type="text"
                   name="nombre"
                   placeholder="Nombre completo"
                   required>

            <input type="email"
                   name="correo"
                   placeholder="Correo electrónico"
                   required>

            <input type="password"
                   name="password"
                   placeholder="Contraseña"
                   required>

            <button type="submit">
                Registrarse
            </button>

        </form>

        <div class="registro-link">
            ¿Ya tienes cuenta?

            <a href="/login">
                Iniciar sesión
            </a>

        </div>

    </div>

</div>

</body>
</html>
