<h1>💈 Dashboard Barbería</h1>

<h3>Total reservas: {{ total }}</h3>
<h3>Ingresos: S/ {{ ingresos }}</h3>

<table border="1">
    <tr>
        <th>Fecha</th>
        <th>Hora</th>
        <th>Servicio</th>
        <th>Precio</th>
    </tr>

    {% for r in reservas %}
    <tr>
        <td>{{ r.fecha }}</td>
        <td>{{ r.hora }}</td>
        <td>{{ r.servicio }}</td>
        <td>S/ {{ r.precio }}</td>
    </tr>
    {% endfor %}
</table>
